name: micael

services:
  micael-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: micael
      POSTGRES_USER: micael
      POSTGRES_PASSWORD: micael_dev_only
    ports:
      - "5432:5432"
    volumes:
      - micael-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U micael -d micael"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  micael-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MicaelDatabase: Host=micael-postgres;Port=5432;Database=micael;Username=micael;Password=micael_dev_only
      Database__ApplyMigrations: "true"
    ports:
      - "8080:8080"
    depends_on:
      micael-postgres:
        condition: service_healthy

volumes:
  micael-postgres-data:
