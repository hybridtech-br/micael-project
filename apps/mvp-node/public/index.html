<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MICAEL MVP</title><style>body{font-family:Arial,sans-serif;margin:0;background:#f3f5f7;color:#17202a}header{background:#111827;color:#fff;padding:20px}main{padding:20px;max-width:1100px;margin:auto}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card,form,section{background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 8px #0001}.card b{font-size:28px;display:block}form{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}input,select,button{padding:10px;border:1px solid #ccd3da;border-radius:8px}button{background:#111827;color:#fff;cursor:pointer}.panic{background:#b91c1c}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}ul{padding-left:18px}@media(max-width:800px){.cards,.grid,form{grid-template-columns:1fr}}</style></head><body><header><h1>MICAEL</h1><div>Condo + Security — MVP v0.1</div></header><main><div class="cards"><div class="card">Moradores<b id="r">0</b></div><div class="card">Visitantes<b id="v">0</b></div><div class="card">Veículos<b id="c">0</b></div><div class="card">Pânicos<b id="p">0</b></div></div><form id="f"><select id="type"><option value="residents">Morador</option><option value="visitors">Visitante</option><option value="vehicles">Veículo</option></select><input id="name" placeholder="Nome ou identificação" required><input id="unit" placeholder="Bloco / Unidade"><input id="plate" placeholder="Placa do veículo"><button>Cadastrar</button><button type="button" class="panic" id="panic">Botão de Pânico</button></form><div class="grid"><section><h2>Moradores</h2><ul id="residents"></ul></section><section><h2>Visitantes</h2><ul id="visitors"></ul></section><section><h2>Veículos</h2><ul id="vehicles"></ul></section><section><h2>Alertas</h2><ul id="panicEvents"></ul></section></div></main><script>const q=s=>document.querySelector(s);async function api(p,o){return fetch('/api/'+p,o).then(r=>r.json())}async function refresh(){const d=await api('dashboard');r.textContent=d.residents;v.textContent=d.visitors;c.textContent=d.vehicles;p.textContent=d.panicEvents;for(const x of ['residents','visitors','vehicles','panicEvents']){const data=await api(x);q('#'+x).innerHTML=data.slice(-8).reverse().map(i=>`<li>${i.name||i.plate||i.unit||'Evento'} ${i.unit?'— '+i.unit:''}</li>`).join('')}}f.onsubmit=async e=>{e.preventDefault();const payload={name:name.value,unit:unit.value,plate:plate.value};await api(type.value,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});f.reset();refresh()};panic.onclick=async()=>{await api('panicEvents',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name:'Pânico acionado',unit:unit.value||'Não informado'})});refresh()};refresh()</script></body></html>
